function TriviaGame() {
  const [screen, setScreen] = useState("welcome");
  const [configTab, setConfigTab] = useState("categories");
  const [teams, setTeams] = useState([]);
  const [selCats, setSelCats] = useState(Object.keys(QUESTION_BANK).slice(0,3));
  const [disabledQs, setDisabledQs] = useState(new Set());
  const [customQs, setCustomQs] = useState([]);
  const [totalQCount, setTotalQCount] = useState(12);
  const [bonusFreq, setBonusFreq] = useState(3);
  const [bonuses, setBonuses] = useState(DEFAULT_BONUSES.map(b=>({...b})));
  const [expandedCat, setExpandedCat] = useState(null);
  const [tName, setTName] = useState(""); const [tLeader, setTLeader] = useState("");
  const [tMembers, setTMembers] = useState(Array(7).fill(""));
  const [showCqForm, setShowCqForm] = useState(false);
  const [cqText, setCqText] = useState(""); const [cqType, setCqType] = useState("multiple");
  const [cqOpts, setCqOpts] = useState(["","","",""]); const [cqAns, setCqAns] = useState("");
  const [cqPts, setCqPts] = useState(10);
  const [showBonusForm, setShowBonusForm] = useState(false);
  const [cbTitle, setCbTitle] = useState(""); const [cbDesc, setCbDesc] = useState(""); const [cbEmoji, setCbEmoji] = useState("🎯");
  const [questions, setQuestions] = useState([]);
  const [qIdx, setQIdx] = useState(0);
  const [phase, setPhase] = useState("question");
  const [picked, setPicked] = useState(null);
  const [textAns, setTextAns] = useState("");
  const [buzzed, setBuzzed] = useState(null);
  const [roundsPlayed, setRoundsPlayed] = useState(0);
  const [bonus, setBonus] = useState(null);
  const [paused, setPaused] = useState(false);

  const toggleQ = key => setDisabledQs(p => { const n=new Set(p); n.has(key)?n.delete(key):n.add(key); return n; });

  const enabledCount = (() => {
    let c=0;
    selCats.forEach(cat=>(QUESTION_BANK[cat]||[]).forEach((_,i)=>{ if(!disabledQs.has(`${cat}__${i}`))c++; }));
    customQs.forEach((_,i)=>{ if(!disabledQs.has(`custom__${i}`))c++; });
    return c;
  })();

  const addTeam = () => {
    if(!tName.trim()||!tLeader.trim()||teams.length>=4) return;
    setTeams(p=>[...p,{id:Date.now(),name:tName.trim(),leader:tLeader.trim(),members:tMembers.filter(m=>m.trim()),score:0,color:TEAM_COLORS[p.length]}]);
    setTName(""); setTLeader(""); setTMembers(Array(7).fill(""));
  };

  const buildPool = () => {
    let pool=[];
    selCats.forEach(cat=>(QUESTION_BANK[cat]||[]).forEach((q,i)=>{ if(!disabledQs.has(`${cat}__${i}`)) pool.push({...q,category:cat}); }));
    customQs.forEach((q,i)=>{ if(!disabledQs.has(`custom__${i}`)) pool.push({...q}); });
    return pool.sort(()=>Math.random()-.5).slice(0,Math.min(totalQCount,pool.length));
  };

  const startGame = () => {
    setQuestions(buildPool()); setQIdx(0); setRoundsPlayed(0);
    setPicked(null); setTextAns(""); setBuzzed(null); setPhase("question"); setPaused(false);
    setScreen("playing");
  };

  const award = (tid,pts) => setTeams(p=>p.map(t=>t.id===tid?{...t,score:t.score+pts}:t));

  const nextQ = () => {
    const nr=roundsPlayed+1; setRoundsPlayed(nr);
    setPicked(null); setTextAns(""); setBuzzed(null);
    const nx=qIdx+1;
    if(nx>=questions.length){setScreen("results");return;}
    if(nr%bonusFreq===0&&bonuses.length>0){setBonus(bonuses[Math.floor(Math.random()*bonuses.length)]);setScreen("bonus");return;}
    setQIdx(nx); setPhase("question");
  };

  const afterBonus = () => {
    const nx=qIdx+1;
    if(nx>=questions.length){setScreen("results");return;}
    setQIdx(nx); setPhase("question"); setScreen("playing");
  };

  const addCustomQ = () => {
    if(!cqText.trim()||!cqAns.trim()) return;
    setCustomQs(p=>[...p,{type:cqType,question:cqText.trim(),options:cqType==="multiple"?cqOpts.filter(o=>o.trim()):[],answer:cqAns.trim(),points:cqPts,category:"Custom"}]);
    setCqText(""); setCqOpts(["","","",""]); setCqAns(""); setShowCqForm(false);
  };

  const addBonus = () => {
    if(!cbTitle.trim()||!cbDesc.trim()) return;
    setBonuses(p=>[...p,{id:Date.now(),emoji:cbEmoji,title:cbTitle.trim(),description:cbDesc.trim()}]);
    setCbTitle(""); setCbDesc(""); setCbEmoji("🎯"); setShowBonusForm(false);
  };

  const q = questions[qIdx];
  const sorted = [...teams].sort((a,b)=>b.score-a.score);
  const effectiveTotal = Math.min(totalQCount, enabledCount);

  if(screen==="welcome") return (
    <div className="app center">
      <h1 className="game-title">TRIVIA NIGHT</h1>
      <p className="subtitle">The Ultimate Party Quiz Game</p>
      <button className="btn btn-yellow" style={{fontSize:"1.1rem",padding:"15px 44px"}} onClick={()=>setScreen("teams")}>Start New Game</button>
      <div style={{marginTop:40,display:"flex",gap:14,flexWrap:"wrap",justifyContent:"center"}}>
        {["Up to 4 Teams","6–8 Players Each","3 Question Types","Custom Questions & Bonuses","Play Local or Remote"].map(f=>(
          <div key={f} style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.09)",borderRadius:11,padding:"8px 14px",fontSize:".81rem",color:"rgba(255,255,255,.48)",fontWeight:700}}>{f}</div>
        ))}
      </div>
    </div>
  );

  if(screen==="teams") return (
    <div className="app"><div className="wrap">
      <div className="row" style={{marginBottom:22}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>setScreen("welcome")}>← Back</button>
        <div><div className="screen-title">Team Setup</div><div className="screen-sub">Add 2–4 teams, each needs a name and a leader</div></div>
      </div>
      {teams.map((t,i)=>(
        <div key={t.id} className="team-row fade" style={{borderColor:t.color,background:`${t.color}10`}}>
          <div>
            <div className="row" style={{gap:8,marginBottom:4}}>
              <div style={{width:10,height:10,borderRadius:"50%",background:t.color,flexShrink:0}}/>
              <span style={{fontWeight:900}}>{t.name}</span>
              <span className="tag" style={{background:`${t.color}22`,color:t.color}}>Team {i+1}</span>
            </div>

          <button className="btn btn-danger btn-sm" onClick={()=>setTeams(p=>p.filter(x=>x.id!==t.id))}>Remove</button>

        </div>

      {teams.length>=2
        ?<button className="btn btn-yellow btn-full" onClick={()=>{setConfigTab("categories");setScreen("config")}}>Continue to Game Setup →</button>
        :<p style={{textAlign:"center",color:"rgba(255,255,255,.25)",fontSize:".87rem",marginTop:8}}>Add at least 2 teams to continue</p>
      }
    </div></div>
  );

  if(screen==="config") return (
    <div className="app"><div className="wrap">
      <div className="row" style={{marginBottom:18}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>setScreen("teams")}>← Back</button>
        <div><div className="screen-title">Game Setup</div><div className="screen-sub">Customise every detail before you start</div></div>
      </div>
      <div className="tab-bar">
        {[["categories","Categories"],["questions","Questions"],["bonuses","Bonus Rounds"],["settings","Settings"]].map(([v,l])=>(
          <button key={v} className={`tab ${configTab===v?"on":""}`} onClick={()=>setConfigTab(v)}>{l}</button>
        ))}
      </div>

      {configTab==="categories"&&(
        <div className="fade">
          <div className="card">
            <span className="label" style={{marginBottom:12,display:"block"}}>Select Categories</span>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              {Object.keys(QUESTION_BANK).map(cat=>(
                <button key={cat} className={`chip ${selCats.includes(cat)?"on":""}`}

                  {cat}
                </button>
              ))}
            </div>
            <p style={{marginTop:12,fontSize:".8rem",color:"rgba(255,255,255,.3)"}}>{selCats.length} categor{selCats.length===1?"y":"ies"} selected · {enabledCount} questions available</p>
          </div>
          <div className="card">
            <span className="label" style={{marginBottom:6,display:"block"}}>Number of Questions to Play</span>
            <div className="row" style={{marginBottom:8}}>
              <input type="range" min={1} max={Math.max(enabledCount,1)} value={effectiveTotal} step={1} style={{flex:1}} onChange={e=>setTotalQCount(+e.target.value)}/>
              <span style={{fontFamily:"'Boogaloo',cursive",fontSize:"1.8rem",color:"#FFE600",minWidth:44,textAlign:"right"}}>{effectiveTotal}</span>
            </div>
            <p style={{fontSize:".79rem",color:"rgba(255,255,255,.3)"}}>Drag to choose how many questions appear in your game (max {enabledCount} available)</p>
          </div>
        </div>
      )}

      {configTab==="questions"&&(
        <div className="fade">
          <p style={{fontSize:".84rem",color:"rgba(255,255,255,.38)",marginBottom:14,lineHeight:1.6}}>Click a category to expand it. Toggle individual questions on or off — disabled questions won't appear in the game.</p>
          {selCats.map(cat=>{

            const activeCount=qs.filter((_,i)=>!disabledQs.has(`${cat}__${i}`)).length;

              <div className="card" key={cat} style={{marginBottom:12}}>
                <button className="cat-header" onClick={()=>setExpandedCat(expandedCat===cat?null:cat)}>

                    <span style={{fontWeight:900,color:"#fff",fontSize:"1rem"}}>{cat}</span>
                    <span style={{marginLeft:10,fontSize:".78rem",color:"rgba(255,255,255,.35)",fontWeight:700}}>{activeCount}/{qs.length} active</span>
                  </div>
                  <span style={{color:"rgba(255,255,255,.3)",fontSize:".9rem"}}>{expandedCat===cat?"▲":"▼"}</span>
                </button>
                {expandedCat===cat&&(
                  <div style={{marginTop:14}}>
                    {qs.map((q,i)=>{
                      const key=`${cat}__${i}`;
                      const active=!disabledQs.has(key);
                      return(
                        <div key={i} className={`q-item ${active?"":"off"}`}>
                          <button className={`toggle ${active?"tgl-on":"tgl-off"}`} onClick={()=>toggleQ(key)}/>

                            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:5}}>
                              <span className="tag" style={{background:`${TYPE_COLORS[q.type]}18`,color:TYPE_COLORS[q.type],border:`1px solid ${TYPE_COLORS[q.type]}30`,fontSize:".7rem"}}>{q.type}</span>
                              <span className="tag" style={{background:"rgba(255,230,0,.1)",color:"#FFE600",border:"1px solid rgba(255,230,0,.18)",fontSize:".7rem"}}>{q.points} pts</span>
                            </div>
                            <p style={{fontSize:".84rem",color:"rgba(255,255,255,.75)",fontWeight:700,lineHeight:1.4,marginBottom:3}}>{q.question}</p>
                            <p style={{fontSize:".73rem",color:"rgba(255,255,255,.28)"}}>Answer: {q.answer}</p>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
          <div className="card">
            <div className="row" style={{justifyContent:"space-between",marginBottom:10}}>
              <span className="label" style={{marginBottom:0}}>Custom Questions ({customQs.length})</span>
              <button className="btn btn-ghost btn-sm" onClick={()=>setShowCqForm(!showCqForm)}>{showCqForm?"Cancel":"+ Add Question"}</button>
            </div>
            {customQs.map((cq,i)=>(
              <div key={i} className="custom-q-row">
                <div style={{flex:1,minWidth:0}}>
                  <span className="tag" style={{background:`${TYPE_COLORS[cq.type]}18`,color:TYPE_COLORS[cq.type],border:`1px solid ${TYPE_COLORS[cq.type]}28`,marginRight:7,fontSize:".7rem"}}>{cq.type}</span>
                  <span style={{fontSize:".84rem",color:"rgba(255,255,255,.7)",fontWeight:700}}>{cq.question.slice(0,60)}{cq.question.length>60&&"…"}</span>
                </div>
                <button className="btn btn-danger btn-sm" onClick={()=>setCustomQs(p=>p.filter((_,j)=>j!==i))}>✕</button>
              </div>
            ))}
            {showCqForm&&(
              <div style={{background:"rgba(255,255,255,.04)",borderRadius:14,padding:16,marginTop:10}}>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
                  {["multiple","text","buzzer"].map(t=><button key={t} className={`chip ${cqType===t?"on":""}`} onClick={()=>setCqType(t)}>{TYPE_LABELS[t]}</button>)}
                </div>
                <span className="label">Question *</span>
                <textarea className="inp" style={{resize:"vertical",minHeight:68,marginBottom:12}} placeholder="Enter your question…" value={cqText} onChange={e=>setCqText(e.target.value)}/>
                {cqType==="multiple"&&<>
                  <span className="label">Answer Options</span>
                  <div className="grid2" style={{marginBottom:12}}>
                    {cqOpts.map((o,i)=><input key={i} className="inp" placeholder={`Option ${LETTERS[i]}`} value={o} style={{marginBottom:6}} onChange={e=>{const u=[...cqOpts];u[i]=e.target.value;setCqOpts(u)}}/>)}
                  </div>
                </>}
                <div className="grid2" style={{marginBottom:12}}>
                  <div><span className="label">Correct Answer *</span><input className="inp" placeholder="Answer…" value={cqAns} onChange={e=>setCqAns(e.target.value)}/></div>

                    <select className="inp" value={cqPts} onChange={e=>setCqPts(+e.target.value)}>

                  </div>
                </div>
                <button className="btn btn-yellow" style={{width:"100%"}} onClick={addCustomQ} disabled={!cqText.trim()||!cqAns.trim()}>Save Question</button>
              </div>
            )}
          </div>
        </div>
      )}

            <div key={b.id} className="bonus-item">
              <span style={{fontSize:"1.6rem",flexShrink:0}}>{b.emoji}</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:900,fontSize:".92rem",marginBottom:3}}>{b.title}</div>
                <div style={{fontSize:".77rem",color:"rgba(255,255,255,.36)",lineHeight:1.4}}>{b.description.slice(0,85)}{b.description.length>85&&"…"}</div>
              </div>
              <button className="btn btn-danger btn-sm" onClick={()=>setBonuses(p=>p.filter((_,j)=>j!==i))}>Remove</button>
            </div>
          ))}
          {bonuses.length===0&&<div style={{textAlign:"center",color:"rgba(255,255,255,.22)",padding:"18px 0",fontSize:".85rem"}}>No bonus rounds — add some below</div>}
          <div className="card" style={{marginTop:8}}>
            <div className="row" style={{justifyContent:"space-between",marginBottom:10}}>
              <span className="label" style={{marginBottom:0}}>Add Custom Bonus Round</span>
              <button className="btn btn-ghost btn-sm" onClick={()=>setShowBonusForm(!showBonusForm)}>{showBonusForm?"Cancel":"+ Add"}</button>
            </div>
            {showBonusForm&&(
              <div>
                <div className="grid2" style={{marginBottom:12}}>
                  <div><span className="label">Emoji</span><input className="inp" placeholder="🎯" value={cbEmoji} maxLength={2} onChange={e=>setCbEmoji(e.target.value)}/></div>
                  <div><span className="label">Title *</span><input className="inp" placeholder="e.g. Sing-Off!" value={cbTitle} onChange={e=>setCbTitle(e.target.value)}/></div>
                </div>

                <textarea className="inp" style={{resize:"vertical",minHeight:72,marginBottom:12}} placeholder="Describe the activity and how points are awarded…" value={cbDesc} onChange={e=>setCbDesc(e.target.value)}/>
                <button className="btn btn-yellow" style={{width:"100%"}} onClick={addBonus} disabled={!cbTitle.trim()||!cbDesc.trim()}>Save Bonus Round</button>
              </div>
            )}
          </div>
        </div>
      )}

      {configTab==="settings"&&(

            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              {[2,3,4,5,6].map(n=><button key={n} className={`chip ${bonusFreq===n?"on":""}`} onClick={()=>setBonusFreq(n)}>Every {n} questions</button>)}

          </div>

            <span className="label" style={{marginBottom:10,display:"block"}}>Teams ({teams.length})</span>
            <div style={{display:"flex",gap:9,flexWrap:"wrap",marginBottom:12}}>
              {teams.map(t=><div key={t.id} className="tag" style={{background:`${t.color}18`,color:t.color,border:`1px solid ${t.color}30`,padding:"6px 14px",fontSize:".85rem"}}>{t.name} · {t.leader}</div>)}
            </div>
            <button className="btn btn-ghost btn-sm" onClick={()=>setScreen("teams")}>Edit Teams</button>
          </div>
          <div className="card">
            <span className="label" style={{marginBottom:10,display:"block"}}>Game Summary</span>
            {[["Categories",`${selCats.length} selected`],["Questions",`${effectiveTotal} will be played`],["Bonus Rounds",`${bonuses.length} active, every ${bonusFreq} questions`],["Custom Questions",`${customQs.length} added`]].map(([k,v])=>(
              <div key={k} style={{display:"flex",justifyContent:"space-between",fontSize:".87rem",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,.06)"}}>
                <span style={{color:"rgba(255,255,255,.38)",fontWeight:700}}>{k}</span>
                <span style={{color:"rgba(255,255,255,.75)",fontWeight:800}}>{v}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{height:16}}/>
      <button className="btn btn-yellow btn-full" onClick={startGame} disabled={enabledCount===0||teams.length<2}>
        {enabledCount===0?"No questions enabled":"Start Game!"}
      </button>
    </div></div>
  );

  if(screen==="playing"){
    if(paused) return(
      <div className="app">
        <div className="pause-wrap">
          <div className="pause-card fade">
            <div style={{fontSize:"2.5rem",marginBottom:8}}>⏸</div>
            <h2 style={{fontFamily:"'Boogaloo',cursive",fontSize:"1.8rem",color:"#FFE600",marginBottom:4}}>Game Paused</h2>
            <p style={{fontSize:".82rem",color:"rgba(255,255,255,.35)",marginBottom:22}}>Question {qIdx+1} of {questions.length}</p>
            <div className="divider" style={{marginBottom:18}}/>
            <span className="label" style={{marginBottom:10,display:"block",textAlign:"left"}}>Current Standings</span>
            {sorted.map((t,i)=>(
              <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:11,background:`${t.color}12`,border:`1px solid ${t.color}25`,marginBottom:7}}>
                <span style={{fontSize:".78rem",color:"rgba(255,255,255,.32)",fontWeight:800,width:18}}>#{i+1}</span>
                <span style={{flex:1,fontWeight:800,color:"rgba(255,255,255,.82)"}}>{t.name}</span>
                <span style={{fontFamily:"'Boogaloo',cursive",fontSize:"1.4rem",color:t.color}}>{t.score}</span>
              </div>
            ))}
            <div className="divider" style={{margin:"20px 0"}}/>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <button className="btn btn-yellow btn-full" onClick={()=>setPaused(false)}>▶ Resume Game</button>
              <button className="btn btn-ghost btn-full" onClick={()=>{setPaused(false);setConfigTab("settings");setScreen("config")}}>⚙ Back to Settings</button>
              <button className="btn btn-danger btn-full" onClick={()=>{setTeams(p=>p.map(t=>({...t,score:0})));setPaused(false);setScreen("welcome")}}>✕ Exit to Main Menu</button>
            </div>
          </div>
        </div>
      </div>
    );

    if(!q) return null;
    const prog=(qIdx/Math.max(questions.length,1))*100;
    return(
      <div className="app"><div className="wrap">
        <div className="row" style={{justifyContent:"space-between",marginBottom:12}}>
          <div style={{display:"flex",gap:7,flexWrap:"wrap",flex:1}}>
            {teams.map(t=>(
              <div key={t.id} className="score-badge" style={{background:`${t.color}14`,color:t.color,borderColor:`${t.color}38`}}>
                <span style={{fontSize:".7rem",opacity:.75}}>{t.name}</span><strong>{t.score}</strong>
              </div>
            ))}
          </div>
          <div className="row" style={{gap:8,flexShrink:0}}>
            <span style={{fontSize:".78rem",color:"rgba(255,255,255,.3)"}}>Q {qIdx+1}/{questions.length}</span>
            <button className="btn btn-ghost btn-sm" onClick={()=>setPaused(true)}>⏸ Menu</button>
          </div>
        </div>
        <div className="prog-bar"><div className="prog-fill" style={{width:`${prog}%`}}/></div>
        <div className="card">
          <div className="row" style={{justifyContent:"space-between",marginBottom:14}}>
            <span className="qtype-badge" style={{background:`${TYPE_COLORS[q.type]}15`,color:TYPE_COLORS[q.type],borderColor:`${TYPE_COLORS[q.type]}35`}}>{TYPE_LABELS[q.type]}</span>
            <div className="row" style={{gap:8}}>
              <span style={{fontSize:".76rem",color:"rgba(255,255,255,.28)"}}>{q.category}</span>
              <span className="tag" style={{background:"rgba(255,230,0,.1)",color:"#FFE600",border:"1px solid rgba(255,230,0,.2)"}}>{q.points} pts</span>
            </div>
          </div>
          <div style={{fontSize:"clamp(1rem,3vw,1.25rem)",fontWeight:900,lineHeight:1.45,marginBottom:22}}>{q.question}</div>
          {phase==="question"&&(
            <>
              {q.type==="multiple"&&q.options&&q.options.map((opt,i)=>(
                <button key={i} className={`opt ${picked===opt?"picked":""}`} onClick={()=>setPicked(opt)}>
                  <span className="letter">{LETTERS[i]}</span>{opt}
                </button>
              ))}
              {q.type==="text"&&<input className="inp" style={{fontSize:"1rem",padding:"13px 16px",marginBottom:14}} placeholder="Team leader types the answer here…" value={textAns} onChange={e=>setTextAns(e.target.value)}/>}
              {q.type==="buzzer"&&(
                <>
                  <p style={{color:"rgba(255,255,255,.4)",marginBottom:14,fontSize:".86rem"}}>Team leaders — first to buzz in gets to answer out loud!</p>
                  <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:14}}>
                    {teams.map(t=>(
                      <button key={t.id} className="buzz-btn"
                        style={{borderColor:t.color,background:`${t.color}14`,color:t.color,opacity:buzzed&&buzzed!==t.id?.25:1}}
                        onClick={()=>!buzzed&&setBuzzed(t.id)}>
                        {buzzed===t.id?"BUZZED IN!":t.name}
                      </button>
                    ))}
                  </div>
                  {buzzed&&<div style={{padding:12,borderRadius:12,background:"rgba(255,230,0,.08)",border:"1.5px solid rgba(255,230,0,.2)",color:"#FFE600",fontWeight:800,fontSize:".9rem",marginBottom:14}}>
                    {teams.find(t=>t.id===buzzed)?.name} buzzed in! Their leader answers out loud.
                  </div>}
                </>
              )}
              <div className="divider"/>
              <div className="row" style={{justifyContent:"flex-end",gap:10}}>
                <button className="btn btn-danger" onClick={()=>setPhase("reveal")}>Skip</button>
                <button className="btn btn-yellow" onClick={()=>setPhase("reveal")}>Reveal Answer →</button>
              </div>
            </>
          )}
          {phase==="reveal"&&(
            <div className="fade">
              <div className="correct-box">
                <div style={{fontSize:".7rem",fontWeight:800,textTransform:"uppercase",letterSpacing:".1em",color:"rgba(50,215,75,.6)",marginBottom:5}}>Correct Answer</div>
                <div style={{fontSize:"1.15rem",fontWeight:900,color:"#32D74B"}}>{q.answer}</div>
              </div>
              {q.type==="multiple"&&q.options&&(
                <div style={{marginBottom:14}}>
                  {q.options.map((opt,i)=>(
                    <div key={i} className={`opt ${opt===q.answer?"right":opt===picked&&opt!==q.answer?"wrong":""}`} style={{cursor:"default"}}>
                      <span className="letter">{LETTERS[i]}</span>{opt}
                      {opt===q.answer&&<span style={{marginLeft:"auto",color:"#32D74B",fontWeight:900}}>✓</span>}
                    </div>
                  ))}
                </div>
              )}
              <div className="divider"/>
              <span className="label" style={{marginBottom:8,display:"block"}}>Award {q.points} points to:</span>
              <div className="award-grid">
                {teams.map(t=>(
                  <button key={t.id} className="award-btn" style={{background:`${t.color}14`,color:t.color,borderColor:`${t.color}38`}}
                    onClick={()=>{award(t.id,q.points);nextQ()}}>
                    +{q.points} → {t.name}
                  </button>
                ))}
              </div>
              <button className="btn btn-ghost" style={{width:"100%",marginTop:10}} onClick={nextQ}>No Points — Next Question →</button>
            </div>
          )}
        </div>
      </div></div>
    );
  }

  if(screen==="bonus") return(
    <div className="app center">
      <div style={{marginBottom:14}}>
        <span className="tag" style={{background:"rgba(255,159,10,.18)",color:"#FF9F0A",border:"1px solid rgba(255,159,10,.35)",fontSize:".85rem",padding:"6px 16px"}}>BONUS ROUND!</span>
      </div>
      <div className="bonus-wrap">
        <span className="bonus-emoji">{bonus?.emoji}</span>
        <h2 className="bonus-title">{bonus?.title}</h2>
        <p className="bonus-desc">{bonus?.description}</p>
        <span className="label" style={{marginBottom:10,display:"block",textAlign:"left"}}>Award bonus points:</span>
        <div className="award-grid">
          {teams.map(t=>(
            <button key={t.id} className="award-btn" style={{background:`${t.color}14`,color:t.color,borderColor:`${t.color}38`}}
              onClick={()=>{award(t.id,25);afterBonus()}}>
              +25 → {t.name}
            </button>
          ))}
        </div>
        <button className="btn btn-ghost" style={{width:"100%",marginTop:12}} onClick={afterBonus}>Skip Bonus → Continue</button>
      </div>
    </div>
  );

  if(screen==="results"){
    const medals=["🥇","🥈","🥉","4️⃣"];
    return(
      <div className="app">
        <div style={{maxWidth:480,margin:"0 auto",paddingTop:20,textAlign:"center"}}>
          <div style={{fontSize:"3rem",marginBottom:8}}>🎉</div>
          <h1 className="game-title" style={{fontSize:"clamp(2.5rem,8vw,4rem)",marginBottom:4}}>Game Over!</h1>
          <p className="subtitle" style={{marginBottom:28}}>Final Leaderboard</p>
          {sorted.map((t,i)=>(
            <div key={t.id} className="lb-row fade" style={{border:i===0?`2px solid ${t.color}`:"1px solid rgba(255,255,255,.07)",background:i===0?`${t.color}10`:"rgba(255,255,255,.03)"}}>
              <div className="lb-rank" style={{background:i===0?`${t.color}22`:"rgba(255,255,255,.07)",color:i===0?t.color:"rgba(255,255,255,.4)"}}>{i===0?"👑":medals[i]}</div>
              <div style={{flex:1,textAlign:"left"}}>
                <div style={{fontWeight:900}}>{t.name}</div>
                <div style={{fontSize:".77rem",color:"rgba(255,255,255,.35)"}}>Leader: {t.leader}</div>
              </div>
              <div style={{fontFamily:"'Boogaloo',cursive",fontSize:"2rem",color:i===0?t.color:"rgba(255,255,255,.6)"}}>{t.score}</div>
            </div>
          ))}
          <div className="row" style={{justifyContent:"center",marginTop:28,flexWrap:"wrap",gap:12}}>
            <button className="btn btn-yellow" onClick={()=>{setTeams(p=>p.map(t=>({...t,score:0})));startGame()}}>Play Again</button>
            <button className="btn btn-ghost" onClick={()=>{setConfigTab("settings");setScreen("config")}}>Back to Setup</button>
            <button className="btn btn-ghost" onClick={()=>{setTeams(p=>p.map(t=>({...t,score:0})));setScreen("welcome")}}>Main Menu</button>
          </div>
        </div>
      </div>
    );
  }
  return null;
}

const styleEl = document.createElement("style");
styleEl.textContent = CSS;
document.head.appendChild(styleEl);

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<TriviaGame />);
</script>
</body>
</html>
