.q-item{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;border-radius:12px;border:1px solid rgba(255,255,255,.07);margin-bottom:7px;background:rgba(255,255,255,.02)}
.q-item.off{opacity:.35}
.toggle{width:38px;height:22px;border-radius:11px;border:none;cursor:pointer;position:relative;flex-shrink:0;margin-top:1px;transition:background .2s}
.tgl-on{background:#32D74B}
.tgl-off{background:rgba(255,255,255,.18)}
.toggle::after{content:'';position:absolute;top:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .18s}
.tgl-on::after{left:19px}
.tgl-off::after{left:3px}
.bonus-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.08);margin-bottom:8px;background:rgba(255,255,255,.03)}
.team-row{border-radius:16px;padding:13px 16px;margin-bottom:10px;border:2px solid;display:flex;align-items:center;justify-content:space-between}
.custom-q-row{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:11px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.cat-header{background:none;border:none;cursor:pointer;width:100%;text-align:left;display:flex;justify-content:space-between;align-items:center;padding:0}
.pause-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:24px}
.pause-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:32px 28px;max-width:420px;width:100%}
.code-box{background:rgba(255,230,0,.08);border:2px solid rgba(255,230,0,.3);border-radius:16px;padding:20px;text-align:center;margin-bottom:14px}
.code-big{font-family:'Boogaloo',cursive;font-size:3rem;color:#FFE600;letter-spacing:.15em}
.player-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:28px 24px;width:100%;max-width:420px}
.waiting-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#FFE600;margin:0 3px;animation:pulse 1.2s ease-in-out infinite}
.waiting-dot:nth-child(2){animation-delay:.2s}
.waiting-dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.role-card{background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.1);border-radius:24px;padding:32px 28px;cursor:pointer;transition:all .2s;text-align:center;flex:1;min-width:200px;max-width:280px}
.role-card:hover{transform:translateY(-4px);border-color:rgba(255,230,0,.4);background:rgba(255,230,0,.06)}
.role-icon{font-size:3rem;margin-bottom:12px;display:block}
.player-joined{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:11px;margin-bottom:7px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)}
.sub-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:13px;margin-bottom:7px;transition:all .2s}
`;

function genCode(len){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:len},()=>c[Math.floor(Math.random()*c.length)]).join('');}
function toArr(obj){if(!obj)return[];if(Array.isArray(obj))return obj;return Object.keys(obj).sort((a,b)=>+a-+b).map(k=>obj[k]);}
function toTeamsArr(obj){if(!obj)return[];return Object.entries(obj).map(([code,t])=>({...t,code}));}

function App(){
  const [role,setRole]=useState(null);
  const styleEl=useRef(null);
  useEffect(()=>{
    if(!styleEl.current){const el=document.createElement('style');el.textContent=CSS;document.head.appendChild(el);styleEl.current=el;}
  },[]);
  if(!role)return <WelcomeScreen onSelect={setRole}/>;
  if(role==='host')return <HostApp onExit={()=>setRole(null)}/>;
  return <PlayerApp onExit={()=>setRole(null)}/>;
}

function WelcomeScreen({onSelect}){
  return(
    <div className="app center">
      <h1 className="game-title">TRIVIA NIGHT</h1>
      <p className="subtitle">The Ultimate Party Quiz Game</p>
      <div style={{display:"flex",gap:20,flexWrap:"wrap",justifyContent:"center",marginTop:8}}>
        <div className="role-card" onClick={()=>onSelect('host')}>
          <span className="role-icon">🎮</span>
          <div style={{fontFamily:"'Boogaloo',cursive",fontSize:"1.6rem",color:"#FFE600",marginBottom:8}}>I'm the Host</div>
          <div style={{fontSize:".85rem",color:"rgba(255,255,255,.45)",lineHeight:1.5}}>Create a game, set up teams, control questions and award points</div>
        </div>
        <div className="role-card" onClick={()=>onSelect('player')}>
          <span className="role-icon">🙋</span>
          <div style={{fontFamily:"'Boogaloo',cursive",fontSize:"1.6rem",color:"#0A84FF",marginBottom:8}}>I'm a Player</div>
          <div style={{fontSize:".85rem",color:"rgba(255,255,255,.45)",lineHeight:1.5}}>Join with a room code, buzz in and answer questions with your team</div>
        </div>
      </div>
    </div>
  );
}

function HostApp({onExit}){
  const [screen,setScreen]=useState('teams');
  const [configTab,setConfigTab]=useState('categories');
  const [teams,setTeams]=useState([]);
  const [selCats,setSelCats]=useState(Object.keys(QB).slice(0,3));
  const [disabledQs,setDisabledQs]=useState(new Set());
  const [customQs,setCustomQs]=useState([]);
  const [totalQCount,setTotalQCount]=useState(12);
  const [bonusFreq,setBonusFreq]=useState(3);
  const [bonuses,setBonuses]=useState(DEF_BONUSES.map(b=>({...b})));
  const [expandedCat,setExpandedCat]=useState(null);
  const [tName,setTName]=useState('');const [tLeader,setTLeader]=useState('');
  const [tMembers,setTMembers]=useState(Array(7).fill(''));
  const [showCqForm,setShowCqForm]=useState(false);
  const [cqText,setCqText]=useState('');const [cqType,setCqType]=useState('multiple');
  const [cqOpts,setCqOpts]=useState(['','','','']);const [cqAns,setCqAns]=useState('');const [cqPts,setCqPts]=useState(10);
  const [showBonusForm,setShowBonusForm]=useState(false);
  const [cbTitle,setCbTitle]=useState('');const [cbDesc,setCbDesc]=useState('');const [cbEmoji,setCbEmoji]=useState('🎯');
  const [roomCode,setRoomCode]=useState('');
  const [gameState,setGameState]=useState(null);
  const [paused,setPaused]=useState(false);
  const listenerRef=useRef(null);

  const toggleQ=key=>setDisabledQs(p=>{const n=new Set(p);n.has(key)?n.delete(key):n.add(key);return n;});

  const enabledCount=(()=>{
    let c=0;
    selCats.forEach(cat=>(QB[cat]||[]).forEach((_,i)=>{if(!disabledQs.has(`${cat}__${i}`))c++;}));
    customQs.forEach((_,i)=>{if(!disabledQs.has(`custom__${i}`))c++;});
    return c;
  })();

  const effectiveTotal=Math.min(totalQCount,enabledCount);

  const addTeam=()=>{
    if(!tName.trim()||!tLeader.trim()||teams.length>=4)return;
    setTeams(p=>[...p,{id:Date.now(),name:tName.trim(),leader:tLeader.trim(),members:tMembers.filter(m=>m.trim()),score:0,color:TEAM_COLORS[p.length]}]);
    setTName('');setTLeader('');setTMembers(Array(7).fill(''));
  };

  const buildPool=()=>{
    let pool=[];
    selCats.forEach(cat=>(QB[cat]||[]).forEach((q,i)=>{if(!disabledQs.has(`${cat}__${i}`))pool.push({...q,category:cat});}));
    customQs.forEach((q,i)=>{if(!disabledQs.has(`custom__${i}`))pool.push({...q});});
    return pool.sort(()=>Math.random()-.5).slice(0,Math.min(totalQCount,pool.length));
  };

  const launchGame=async()=>{
    const code=genCode(6);
    const pool=buildPool();
    const teamsObj={};
    teams.forEach((t)=>{
      const tc=genCode(4);
      teamsObj[tc]={name:t.name,leader:t.leader,members:t.members||[],score:0,color:t.color,code:tc};
    });
    const gameData={
      status:'lobby',teams:teamsObj,questions:pool,
      currentQ:{index:0,phase:'question',buzzedTeam:null,buzzedTeamName:null,submittedAnswer:'',teamAnswers:{},teamSelections:{}},
      bonusRound:null,players:{},bonusFreq,roundsPlayed:0,
      bonuses:bonuses.slice(0,bonuses.length),createdAt:Date.now()
    };
    try{
      await db.ref(`games/${code}`).set(gameData);
      setRoomCode(code);
      const teamsWithCodes=Object.entries(teamsObj).map(([tc,t])=>({...t,id:tc}));
      setTeams(teamsWithCodes);
      setScreen('lobby');
      const ref=db.ref(`games/${code}`);
      ref.on('value',snap=>{if(snap.exists())setGameState(snap.val());});
      listenerRef.current=ref;
    }catch(e){alert('Error creating game: '+e.message);}
  };

  useEffect(()=>{return()=>{if(listenerRef.current)listenerRef.current.off();};},[]);

  const startPlaying=async()=>{ await db.ref(`games/${roomCode}/status`).set('playing'); };
  const revealAnswer=async()=>{ await db.ref(`games/${roomCode}/currentQ/phase`).set('reveal'); };

  const awardAndNext=async(teamCode,pts)=>{
    if(pts>0)await db.ref(`games/${roomCode}/teams/${teamCode}/score`).transaction(s=>(s||0)+pts);
    await goNext();
  };

  const goNext=async()=>{
    const g=gameState;if(!g)return;
    const qs=toArr(g.questions);
    const nr=(g.roundsPlayed||0)+1;
    const nx=g.currentQ.index+1;
    if(nx>=qs.length){await db.ref(`games/${roomCode}/status`).set('results');return;}
    if(nr%g.bonusFreq===0&&bonuses.length>0){
      const b=bonuses[Math.floor(Math.random()*bonuses.length)];
      await db.ref(`games/${roomCode}`).update({bonusRound:{emoji:b.emoji,title:b.title,description:b.description},status:'bonus',roundsPlayed:nr});
      return;
    }
    await db.ref(`games/${roomCode}`).update({
      currentQ:{index:nx,phase:'question',buzzedTeam:null,buzzedTeamName:null,submittedAnswer:'',teamAnswers:{},teamSelections:{}},
      roundsPlayed:nr,status:'playing'
    });
  };

  const afterBonus=async()=>{
    const g=gameState;if(!g)return;
    const qs=toArr(g.questions);
    const nx=g.currentQ.index+1;
    if(nx>=qs.length){await db.ref(`games/${roomCode}/status`).set('results');return;}
    await db.ref(`games/${roomCode}`).update({
      bonusRound:null,status:'playing',
      currentQ:{index:nx,phase:'question',buzzedTeam:null,buzzedTeamName:null,submittedAnswer:'',teamAnswers:{},teamSelections:{}}
    });
  };

  const awardBonusAndNext=async(teamCode)=>{
    await db.ref(`games/${roomCode}/teams/${teamCode}/score`).transaction(s=>(s||0)+25);
    await afterBonus();
  };

  const addCustomQ=()=>{
    if(!cqText.trim()||!cqAns.trim())return;
    setCustomQs(p=>[...p,{type:cqType,question:cqText.trim(),options:cqType==='multiple'?cqOpts.filter(o=>o.trim()):[],answer:cqAns.trim(),points:cqPts,category:'Custom'}]);
    setCqText('');setCqOpts(['','','','']);setCqAns('');setShowCqForm(false);
  };

  const addBonus=()=>{
    if(!cbTitle.trim()||!cbDesc.trim())return;
    setBonuses(p=>[...p,{id:Date.now(),emoji:cbEmoji,title:cbTitle.trim(),description:cbDesc.trim()}]);
    setCbTitle('');setCbDesc('');setCbEmoji('🎯');setShowBonusForm(false);
  };

  const exitGame=async()=>{
    if(roomCode)await db.ref(`games/${roomCode}/status`).set('ended');
    if(listenerRef.current)listenerRef.current.off();
    onExit();
  };

  const g=gameState;
  const status=g?.status;
  if(screen==='lobby'&&status==='playing')setScreen('playing');
  if(screen==='playing'&&status==='bonus')setScreen('bonus');
  if(screen==='bonus'&&status==='playing')setScreen('playing');
  if((screen==='playing'||screen==='bonus')&&status==='results')setScreen('results');

  const teamsArr=g?toTeamsArr(g.teams):teams;
  const sortedTeams=[...teamsArr].sort((a,b)=>b.score-a.score);
  const qs=g?toArr(g.questions):[];
  const q=g&&qs.length>0?qs[g.currentQ?.index||0]:null;
  const players=g?Object.values(g.players||[]):[];

  // TEAMS
  if(screen==='teams')return(
    <div className="app"><div className="wrap">
      <div className="row" style={{marginBottom:22}}>
        <button className="btn btn-ghost btn-sm" onClick={onExit}>← Exit</button>
        <div><div className="screen-title">Team Setup</div><div className="screen-sub">Add 2–4 teams before configuring the game</div></div>
      </div>
      {teams.map((t,i)=>(
        <div key={t.id} className="team-row fade" style={{borderColor:t.color,background:`${t.color}10`}}>
          <div>
            <div className="row" style={{gap:8,marginBottom:4}}>
              <div style={{width:10,height:10,borderRadius:'50%',background:t.color,flexShrink:0}}/>
              <span style={{fontWeight:900}}>{t.name}</span>
              <span className="tag" style={{background:`${t.color}22`,color:t.color}}>Team {i+1}</span>
            </div>
            <div style={{fontSize:'.8rem',color:'rgba(255,255,255,.42)'}}>Leader: <strong style={{color:'rgba(255,255,255,.72)'}}>{t.leader}</strong>{t.members?.length>0&&<span style={{marginLeft:7}}>· {t.members.join(', ')}</span>}</div>
          </div>
          <button className="btn btn-danger btn-sm" onClick={()=>setTeams(p=>p.filter(x=>x.id!==t.id))}>Remove</button>
        </div>
      ))}
      {teams.length<4&&(
        <div className="card">
          <span className="label">Add Team {teams.length+1}</span>
          <div className="grid2" style={{marginBottom:12}}>
            <div><span className="label">Team Name *</span><input className="inp" placeholder="e.g. The Brain Squad" value={tName} onChange={e=>setTName(e.target.value)}/></div>
            <div><span className="label">Team Leader *</span><input className="inp" placeholder="Leader's name" value={tLeader} onChange={e=>setTLeader(e.target.value)}/></div>
          </div>
          <span className="label">Members (optional)</span>
          <div className="grid2">{tMembers.map((m,i)=><input key={i} className="inp" placeholder={`Member ${i+1}`} value={m} style={{marginBottom:8}} onChange={e=>{const u=[...tMembers];u[i]=e.target.value;setTMembers(u)}}/>)}</div>
          <button className="btn btn-yellow" style={{marginTop:14,width:'100%'}} onClick={addTeam} disabled={!tName.trim()||!tLeader.trim()}>+ Add Team</button>
        </div>
      )}
      {teams.length>=2
        ?<button className="btn btn-yellow btn-full" onClick={()=>{setConfigTab('categories');setScreen('config')}}>Continue to Game Setup →</button>
        :<p style={{textAlign:'center',color:'rgba(255,255,255,.25)',fontSize:'.87rem',marginTop:8}}>Add at least 2 teams to continue</p>
      }
    </div></div>
  );

  // CONFIG
  if(screen==='config')return(
    <div className="app"><div className="wrap">
      <div className="row" style={{marginBottom:18}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>setScreen('teams')}>← Back</button>
        <div><div className="screen-title">Game Setup</div><div className="screen-sub">Customise every detail before launching</div></div>
      </div>
      <div className="tab-bar">
        {[['categories','Categories'],['questions','Questions'],['bonuses','Bonus Rounds'],['settings','Settings']].map(([v,l])=>(
          <button key={v} className={`tab ${configTab===v?'on':''}`} onClick={()=>setConfigTab(v)}>{l}</button>
        ))}
      </div>

      {configTab==='categories'&&<div className="fade">
        <div className="card">
          <span className="label" style={{marginBottom:12,display:'block'}}>Select Categories</span>
          <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
            {Object.keys(QB).map(cat=>(
              <button key={cat} className={`chip ${selCats.includes(cat)?'on':''}`}
                onClick={()=>{if(selCats.includes(cat)){if(selCats.length>1)setSelCats(p=>p.filter(c=>c!==cat))}else setSelCats(p=>[...p,cat])}}>
                {cat}
              </button>
            ))}
          </div>
          <p style={{marginTop:12,fontSize:'.8rem',color:'rgba(255,255,255,.3)'}}>{selCats.length} categor{selCats.length===1?'y':'ies'} selected · {enabledCount} questions available</p>
        </div>
        <div className="card">
          <span className="label" style={{marginBottom:6,display:'block'}}>Number of Questions</span>
          <div className="row" style={{marginBottom:8}}>
            <input type="range" min={1} max={Math.max(enabledCount,1)} value={effectiveTotal} step={1} style={{flex:1}} onChange={e=>setTotalQCount(+e.target.value)}/>
            <span style={{fontFamily:"'Boogaloo',cursive",fontSize:'1.8rem',color:'#FFE600',minWidth:44,textAlign:'right'}}>{effectiveTotal}</span>
          </div>
          <p style={{fontSize:'.79rem',color:'rgba(255,255,255,.3)'}}>Drag to set how many questions appear (max {enabledCount} available)</p>
        </div>
      </div>}

      {configTab==='questions'&&<div className="fade">
        <p style={{fontSize:'.84rem',color:'rgba(255,255,255,.38)',marginBottom:14,lineHeight:1.6}}>Click a category to expand it. Toggle questions on or off.</p>
        {selCats.map(cat=>{
          const qs2=QB[cat]||[];
          const ac=qs2.filter((_,i)=>!disabledQs.has(`${cat}__${i}`)).length;
          return(
            <div className="card" key={cat} style={{marginBottom:12}}>
              <button className="cat-header" onClick={()=>setExpandedCat(expandedCat===cat?null:cat)}>
                <div><span style={{fontWeight:900,color:'#fff',fontSize:'1rem'}}>{cat}</span><span style={{marginLeft:10,fontSize:'.78rem',color:'rgba(255,255,255,.35)',fontWeight:700}}>{ac}/{qs2.length} active</span></div>
                <span style={{color:'rgba(255,255,255,.3)',fontSize:'.9rem'}}>{expandedCat===cat?'▲':'▼'}</span>
              </button>
              {expandedCat===cat&&<div style={{marginTop:14}}>
                {qs2.map((q2,i)=>{
                  const key=`${cat}__${i}`;const active=!disabledQs.has(key);
                  return(
                    <div key={i} className={`q-item ${active?'':'off'}`}>
                      <button className={`toggle ${active?'tgl-on':'tgl-off'}`} onClick={()=>toggleQ(key)}/>
                      <div style={{flex:1}}>
                        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:5}}>
                          <span className="tag" style={{background:`${TC[q2.type]}18`,color:TC[q2.type],border:`1px solid ${TC[q2.type]}30`,fontSize:'.7rem'}}>{q2.type}</span>
                          <span className="tag" style={{background:'rgba(255,230,0,.1)',color:'#FFE600',border:'1px solid rgba(255,230,0,.18)',fontSize:'.7rem'}}>{q2.points} pts</span>
                        </div>
                        <p style={{fontSize:'.84rem',color:'rgba(255,255,255,.75)',fontWeight:700,lineHeight:1.4,marginBottom:3}}>{q2.question}</p>
                        <p style={{fontSize:'.73rem',color:'rgba(255,255,255,.28)'}}>Answer: {q2.answer}</p>
                      </div>
                    </div>
                  );
                })}
              </div>}
            </div>
          );
        })}
        <div className="card">
          <div className="row" style={{justifyContent:'space-between',marginBottom:10}}>
            <span className="label" style={{marginBottom:0}}>Custom Questions ({customQs.length})</span>
            <button className="btn btn-ghost btn-sm" onClick={()=>setShowCqForm(!showCqForm)}>{showCqForm?'Cancel':'+ Add'}</button>
          </div>
          {customQs.map((cq,i)=>(
            <div key={i} className="custom-q-row">
              <div style={{flex:1,minWidth:0}}>
                <span className="tag" style={{background:`${TC[cq.type]}18`,color:TC[cq.type],border:`1px solid ${TC[cq.type]}28`,marginRight:7,fontSize:'.7rem'}}>{cq.type}</span>
                <span style={{fontSize:'.84rem',color:'rgba(255,255,255,.7)',fontWeight:700}}>{cq.question.slice(0,60)}{cq.question.length>60&&'…'}</span>
              </div>
              <button className="btn btn-danger btn-sm" onClick={()=>setCustomQs(p=>p.filter((_,j)=>j!==i))}>✕</button>
            </div>
          ))}
          {showCqForm&&<div style={{background:'rgba(255,255,255,.04)',borderRadius:14,padding:16,marginTop:10}}>
            <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}}>
              {['multiple','text','buzzer'].map(t=><button key={t} className={`chip ${cqType===t?'on':''}`} onClick={()=>setCqType(t)}>{TL[t]}</button>)}
            </div>
            <span className="label">Question *</span>
            <textarea className="inp" style={{resize:'vertical',minHeight:68,marginBottom:12}} placeholder="Enter your question…" value={cqText} onChange={e=>setCqText(e.target.value)}/>
            {cqType==='multiple'&&<><span className="label">Answer Options</span><div className="grid2" style={{marginBottom:12}}>{cqOpts.map((o,i)=><input key={i} className="inp" placeholder={`Option ${LETTERS[i]}`} value={o} style={{marginBottom:6}} onChange={e=>{const u=[...cqOpts];u[i]=e.target.value;setCqOpts(u)}}/>)}</div></>}
            <div className="grid2" style={{marginBottom:12}}>
              <div><span className="label">Correct Answer *</span><input className="inp" placeholder="Answer…" value={cqAns} onChange={e=>setCqAns(e.target.value)}/></div>
              <div><span className="label">Points</span><select className="inp" value={cqPts} onChange={e=>setCqPts(+e.target.value)}>{[5,10,15,20,25,30].map(p=><option key={p} value={p}>{p} pts</option>)}</select></div>
            </div>
            <button className="btn btn-yellow" style={{width:'100%'}} onClick={addCustomQ} disabled={!cqText.trim()||!cqAns.trim()}>Save Question</button>
          </div>}
        </div>
      </div>}

      {configTab==='bonuses'&&<div className="fade">
        <p style={{fontSize:'.84rem',color:'rgba(255,255,255,.38)',marginBottom:14,lineHeight:1.6}}>Remove bonus rounds you don't want, or add your own.</p>
        {bonuses.map((b,i)=>(
          <div key={b.id} className="bonus-item">
            <span style={{fontSize:'1.6rem',flexShrink:0}}>{b.emoji}</span>
            <div style={{flex:1}}><div style={{fontWeight:900,fontSize:'.92rem',marginBottom:3}}>{b.title}</div><div style={{fontSize:'.77rem',color:'rgba(255,255,255,.36)',lineHeight:1.4}}>{b.description.slice(0,80)}{b.description.length>80&&'…'}</div></div>
            <button className="btn btn-danger btn-sm" onClick={()=>setBonuses(p=>p.filter((_,j)=>j!==i))}>Remove</button>

        ))}
        {bonuses.length===0&&<div style={{textAlign:'center',color:'rgba(255,255,255,.22)',padding:'18px 0',fontSize:'.85rem'}}>No bonus rounds</div>}
        <div className="card" style={{marginTop:8}}>
          <div className="row" style={{justifyContent:'space-between',marginBottom:10}}>
            <span className="label" style={{marginBottom:0}}>Add Custom Bonus Round</span>
            <button className="btn btn-ghost btn-sm" onClick={()=>setShowBonusForm(!showBonusForm)}>{showBonusForm?'Cancel':'+ Add'}</button>
          </div>
          {showBonusForm&&<div>
            <div className="grid2" style={{marginBottom:12}}>
              <div><span className="label">Emoji</span><input className="inp" placeholder="🎯" value={cbEmoji} maxLength={2} onChange={e=>setCbEmoji(e.target.value)}/></div>
              <div><span className="label">Title *</span><input className="inp" placeholder="e.g. Sing-Off!" value={cbTitle} onChange={e=>setCbTitle(e.target.value)}/></div>
            </div>
            <span className="label">Description *</span>
            <textarea className="inp" style={{resize:'vertical',minHeight:72,marginBottom:12}} placeholder="Describe the activity…" value={cbDesc} onChange={e=>setCbDesc(e.target.value)}/>
            <button className="btn btn-yellow" style={{width:'100%'}} onClick={addBonus} disabled={!cbTitle.trim()||!cbDesc.trim()}>Save Bonus Round</button>
          </div>}
        </div>
      </div>}

      {configTab==='settings'&&<div className="fade">
        <div className="card">
          <span className="label" style={{marginBottom:8,display:'block'}}>Bonus Round Frequency</span>
          <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
            {[2,3,4,5,6].map(n=><button key={n} className={`chip ${bonusFreq===n?'on':''}`} onClick={()=>setBonusFreq(n)}>Every {n} questions</button>)}
          </div>
        </div>
        <div className="card">
          <span className="label" style={{marginBottom:10,display:'block'}}>Teams ({teams.length})</span>
          <div style={{display:'flex',gap:9,flexWrap:'wrap',marginBottom:12}}>
            {teams.map(t=><div key={t.id} className="tag" style={{background:`${t.color}18`,color:t.color,border:`1px solid ${t.color}30`,padding:'6px 14px',fontSize:'.85rem'}}>{t.name} · {t.leader}</div>)}
          </div>
          <button className="btn btn-ghost btn-sm" onClick={()=>setScreen('teams')}>Edit Teams</button>
        </div>
        <div className="card">
          <span className="label" style={{marginBottom:8,display:'block'}}>Game Summary</span>
          {[['Categories',`${selCats.length} selected`],['Questions',`${effectiveTotal} will be played (${enabledCount} available)`],['Bonus Rounds',`${bonuses.length} active, every ${bonusFreq} questions`],['Custom Questions',`${customQs.length} added`]].map(([k,v])=>(
            <div key={k} style={{display:'flex',justifyContent:'space-between',fontSize:'.87rem',padding:'8px 0',borderBottom:'1px solid rgba(255,255,255,.06)'}}>
              <span style={{color:'rgba(255,255,255,.38)',fontWeight:700}}>{k}</span>
              <span style={{color:'rgba(255,255,255,.75)',fontWeight:800}}>{v}</span>
            </div>
          ))}
        </div>
      </div>}

      <div style={{height:16}}/>
      <button className="btn btn-yellow btn-full" onClick={launchGame} disabled={enabledCount===0||teams.length<2}>
        {enabledCount===0?'No questions enabled':'🚀 Launch Game & Get Room Code'}
      </button>
    </div></div>
  );

  // LOBBY
  if(screen==='lobby')return(
    <div className="app"><div className="wrap">
      <div style={{marginBottom:22}}>
        <div className="screen-title">Game Lobby</div>
        <div className="screen-sub">Share these codes with your players</div>
      </div>
      <div className="code-box" style={{marginBottom:14}}>
        <div style={{fontSize:'.78rem',fontWeight:800,textTransform:'uppercase',letterSpacing:'.1em',color:'rgba(255,230,0,.6)',marginBottom:6}}>Room Code — Share with everyone</div>
        <div className="code-big">{roomCode}</div>
        <div style={{fontSize:'.8rem',color:'rgba(255,255,255,.35)',marginTop:6}}>Players open this website and enter this code</div>
      </div>
      <div className="card" style={{marginBottom:14}}>
        <span className="label" style={{marginBottom:12,display:'block'}}>Team Codes — Each team shares their code amongst themselves</span>
        {teamsArr.map(t=>(
          <div key={t.code} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',borderRadius:13,background:`${t.color}10`,border:`1.5px solid ${t.color}30`,marginBottom:8}}>
            <div style={{width:10,height:10,borderRadius:'50%',background:t.color,flexShrink:0}}/>
            <div style={{flex:1}}>
              <div style={{fontWeight:900}}>{t.name}</div>
              <div style={{fontSize:'.78rem',color:'rgba(255,255,255,.4)'}}>Leader: {t.leader}</div>
            </div>
            <div style={{fontFamily:"'Boogaloo',cursive",fontSize:'1.6rem',color:t.color,letterSpacing:'.1em'}}>{t.code}</div>
          </div>
        ))}
      </div>
      <div className="card" style={{marginBottom:18}}>
        <span className="label" style={{marginBottom:10,display:'block'}}>Players Joined ({players.length})</span>
        {players.length===0
          ?<p style={{color:'rgba(255,255,255,.25)',fontSize:'.85rem'}}>Waiting for players<span className="waiting-dot"/><span className="waiting-dot"/><span className="waiting-dot"/></p>
          :players.map((p,i)=>{
            const team=g?.teams?.[p.teamCode];
            return(
              <div key={i} className="player-joined">
                <div style={{width:8,height:8,borderRadius:'50%',background:team?.color||'#888',flexShrink:0}}/>

                <span style={{fontSize:'.8rem',color:'rgba(255,255,255,.38)',fontWeight:700}}>{team?.name||p.teamCode}</span>
              </div>

          })
        }
      </div>
      <button className="btn btn-yellow btn-full" onClick={startPlaying} disabled={players.length===0}>{players.length===0?'Waiting for players…':'Start Game!'}</button>
      <button className="btn btn-ghost btn-full" style={{marginTop:10}} onClick={startPlaying}>Start Without Players (Host-Only Mode)</button>
    </div></div>
  );

  // PLAYING
  if(screen==='playing'){
    if(paused)return(
      <div className="app"><div className="pause-wrap">
        <div className="pause-card fade">
          <div style={{fontSize:'2.5rem',marginBottom:8}}>⏸</div>
          <h2 style={{fontFamily:"'Boogaloo',cursive",fontSize:'1.8rem',color:'#FFE600',marginBottom:4}}>Game Paused</h2>
          <p style={{fontSize:'.82rem',color:'rgba(255,255,255,.35)',marginBottom:22}}>Q {(g?.currentQ?.index||0)+1} of {qs.length}</p>
          <div className="divider" style={{marginBottom:18}}/>
          <span className="label" style={{marginBottom:10,display:'block',textAlign:'left'}}>Standings</span>
          {sortedTeams.map((t,i)=>(
            <div key={t.code} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',borderRadius:11,background:`${t.color}12`,border:`1px solid ${t.color}25`,marginBottom:7}}>

              <span style={{flex:1,fontWeight:800}}>{t.name}</span>
              <span style={{fontFamily:"'Boogaloo',cursive",fontSize:'1.4rem',color:t.color}}>{t.score||0}</span>
            </div>
          ))}

          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            <button className="btn btn-yellow btn-full" onClick={()=>setPaused(false)}>▶ Resume</button>
            <button className="btn btn-danger btn-full" onClick={exitGame}>✕ End Game</button>

        </div>
      </div></div>
    );

    if(!g||!q)return<div className="app center"><p>Loading…</p></div>;
    const prog=((g.currentQ?.index||0)/Math.max(qs.length,1))*100;

    const teamAnswers=currentQ.teamAnswers||{};
    const teamSelections=currentQ.teamSelections||{};

    return(
      <div className="app"><div className="wrap">

            <button className="btn btn-ghost btn-sm" onClick={()=>setPaused(true)}>⏸</button>
          </div>
        </div>
        <div className="prog-bar"><div className="prog-fill" style={{width:`${prog}%`}}/></div>

        <div className="card">
          <div className="row" style={{justifyContent:'space-between',marginBottom:14}}>
            <span className="qtype-badge" style={{background:`${TC[q.type]}15`,color:TC[q.type],borderColor:`${TC[q.type]}35`}}>{TL[q.type]}</span>
            <div className="row" style={{gap:8}}>
              <span style={{fontSize:'.76rem',color:'rgba(255,255,255,.28)'}}>{q.category}</span>
              <span className="tag" style={{background:'rgba(255,230,0,.1)',color:'#FFE600',border:'1px solid rgba(255,230,0,.2)'}}>{q.points} pts</span>
            </div>
          </div>
          <div style={{fontSize:'clamp(1rem,3vw,1.25rem)',fontWeight:900,lineHeight:1.45,marginBottom:20}}>{q.question}</div>

          {currentQ.phase==='question'&&(<>
            {/* MULTIPLE CHOICE — show options + live team selections */}
            {q.type==='multiple'&&q.options&&(<>
              <div style={{marginBottom:14}}>
                {q.options.map((opt,i)=>{
                  const teamsWhoSelected=teamsArr.filter(t=>teamSelections[t.code]===opt);
                  return(
                    <div key={i} style={{display:'flex',alignItems:'center',gap:10,background:'rgba(255,255,255,.05)',border:'2px solid rgba(255,255,255,.1)',borderRadius:14,padding:'11px 16px',marginBottom:8}}>
                      <span className="letter">{LETTERS[i]}</span>
                      <span style={{flex:1,fontWeight:800}}>{opt}</span>
                      <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                        {teamsWhoSelected.map(t=>(
                          <span key={t.code} style={{fontSize:'.72rem',fontWeight:800,padding:'3px 9px',borderRadius:50,background:`${t.color}25`,color:t.color,border:`1px solid ${t.color}40`}}>{t.name}</span>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
              <div style={{fontSize:'.78rem',color:'rgba(255,255,255,.3)',marginBottom:14,fontWeight:700}}>
                {Object.keys(teamSelections).length}/{teamsArr.length} teams selected
              </div>
            </>)}

            {/* TEXT — live per-team submissions */}
            {q.type==='text'&&(<>
              <div style={{marginBottom:14}}>
                <div style={{fontSize:'.72rem',fontWeight:800,textTransform:'uppercase',letterSpacing:'.1em',color:'rgba(255,255,255,.35)',marginBottom:10}}>
                  Team Answers ({Object.keys(teamAnswers).length}/{teamsArr.length})
                </div>
                {teamsArr.map(t=>{
                  const ans=teamAnswers[t.code];
                  return(
                    <div key={t.code} className="sub-row" style={{background:`${t.color}10`,border:`1.5px solid ${ans?t.color:`${t.color}25`}`}}>
                      <div style={{width:9,height:9,borderRadius:'50%',background:t.color,flexShrink:0}}/>
                      <span style={{fontWeight:800,fontSize:'.88rem',flex:1}}>{t.name}</span>
                      {ans?<span style={{fontWeight:900,color:'#FFE600',fontSize:'.95rem'}}>{ans.answer}</span>
                        :<span style={{fontSize:'.78rem',color:'rgba(255,255,255,.25)',fontWeight:700}}>Waiting<span className="waiting-dot"/><span className="waiting-dot"/><span className="waiting-dot"/></span>}
                    </div>
                  );
                })}
              </div>
            </>)}

            {/* BUZZER */}
            {q.type==='buzzer'&&(<>
              <div style={{marginBottom:14}}>
                <div style={{fontSize:'.72rem',fontWeight:800,textTransform:'uppercase',letterSpacing:'.1em',color:'rgba(255,59,107,.7)',marginBottom:10}}>
                  {currentQ.buzzedTeam?'🔔 Team buzzed in!':'🔇 Waiting for buzz…'}
                </div>
                {teamsArr.map(t=>{
                  const isBuzzed=currentQ.buzzedTeam===t.code;
                  const ans=teamAnswers[t.code];
                  return(
                    <div key={t.code} className="sub-row" style={{background:isBuzzed?`${t.color}18`:'rgba(255,255,255,.03)',border:`1.5px solid ${isBuzzed?t.color:'rgba(255,255,255,.08)'}`}}>
                      <div style={{width:9,height:9,borderRadius:'50%',background:t.color,flexShrink:0}}/>
                      <span style={{fontWeight:800,fontSize:'.88rem',flex:1}}>{t.name}</span>
                      {isBuzzed&&!ans&&<span style={{fontSize:'.78rem',color:t.color,fontWeight:800}}>🔔 Buzzed! Typing…</span>}
                      {isBuzzed&&ans&&<span style={{fontWeight:900,color:'#FFE600',fontSize:'.95rem'}}>{ans.answer}</span>}
                      {!isBuzzed&&!currentQ.buzzedTeam&&<span style={{fontSize:'.75rem',color:'rgba(255,255,255,.2)',fontWeight:700}}>Ready</span>}
                      {!isBuzzed&&currentQ.buzzedTeam&&<span style={{fontSize:'.75rem',color:'rgba(255,255,255,.2)',fontWeight:700}}>Too slow</span>}
                    </div>
                  );
                })}
              </div>
            </>)}

            <div className="divider"/>
            <div className="row" style={{justifyContent:'flex-end',gap:10}}>
              <button className="btn btn-danger" onClick={revealAnswer}>Skip</button>
              <button className="btn btn-yellow" onClick={revealAnswer}>Reveal Answer →</button>
            </div>
          </>)}

          {currentQ.phase==='reveal'&&(<div className="fade">
            <div className="correct-box">
              <div style={{fontSize:'.7rem',fontWeight:800,textTransform:'uppercase',letterSpacing:'.1em',color:'rgba(50,215,75,.6)',marginBottom:5}}>Correct Answer</div>
              <div style={{fontSize:'1.15rem',fontWeight:900,color:'#32D74B'}}>{q.answer}</div>
            </div>

            {/* Multiple choice reveal — show who picked what */}
            {q.type==='multiple'&&q.options&&(<div style={{marginBottom:16}}>
              {q.options.map((opt,i)=>{
                const isCorrect=opt===q.answer;
                const teamsWhoSelected=teamsArr.filter(t=>teamSelections[t.code]===opt);
                return(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:10,borderRadius:14,padding:'11px 16px',marginBottom:8,background:isCorrect?'rgba(50,215,75,.15)':'rgba(255,255,255,.04)',border:`2px solid ${isCorrect?'#32D74B':'rgba(255,255,255,.1)'}`}}>
                    <span className="letter">{LETTERS[i]}</span>
                    <span style={{flex:1,fontWeight:800,color:isCorrect?'#32D74B':'rgba(255,255,255,.75)'}}>{opt}</span>
                    {isCorrect&&<span style={{color:'#32D74B',fontWeight:900,marginRight:6}}>✓</span>}
                    <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                      {teamsWhoSelected.map(t=>(
                        <span key={t.code} style={{fontSize:'.72rem',fontWeight:800,padding:'3px 9px',borderRadius:50,background:`${t.color}25`,color:t.color,border:`1px solid ${t.color}40`}}>{t.name}</span>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>)}

            {/* Text + Buzzer reveal — show all answers */}
            {(q.type==='text'||q.type==='buzzer')&&(<div style={{marginBottom:16}}>
              <div style={{fontSize:'.72rem',fontWeight:800,textTransform:'uppercase',letterSpacing:'.1em',color:'rgba(255,255,255,.35)',marginBottom:10}}>Team Answers</div>
              {teamsArr.map(t=>{
                const ans=teamAnswers[t.code];
                const isCorrect=ans&&ans.answer?.toLowerCase().trim()===q.answer?.toLowerCase().trim();
                return(
                  <div key={t.code} className="sub-row" style={{background:isCorrect?'rgba(50,215,75,.12)':'rgba(255,255,255,.03)',border:`1.5px solid ${isCorrect?'rgba(50,215,75,.3)':'rgba(255,255,255,.08)'}`}}>
                    <div style={{width:9,height:9,borderRadius:'50%',background:t.color,flexShrink:0}}/>
                    <span style={{fontWeight:800,fontSize:'.88rem',flex:1}}>{t.name}</span>
                    {ans?<span style={{fontWeight:900,fontSize:'.92rem',color:isCorrect?'#32D74B':'rgba(255,255,255,.6)'}}>{ans.answer}{isCorrect&&' ✓'}</span>
                      :<span style={{fontSize:'.78rem',color:'rgba(255,255,255,.22)',fontWeight:700}}>No answer</span>}
                  </div>
                );
              })}
            </div>)}

            <div className="divider"/>
            <div style={{background:'rgba(255,230,0,.05)',border:'1px solid rgba(255,230,0,.15)',borderRadius:16,padding:16}}>
              <span className="label" style={{marginBottom:12,display:'block',color:'rgba(255,230,0,.7)'}}>Award {q.points} points to:</span>
              <div className="award-grid">
                {teamsArr.map(t=>{
                  const sel=teamSelections[t.code];
                  const ans=teamAnswers[t.code];
                  const isCorrectSel=sel===q.answer;
                  const isCorrectAns=ans&&ans.answer?.toLowerCase().trim()===q.answer?.toLowerCase().trim();
                  const highlight=isCorrectSel||isCorrectAns;
                  return(
                    <button key={t.code} className="award-btn"
                      style={{background:highlight?`${t.color}28`:`${t.color}10`,color:t.color,borderColor:highlight?t.color:`${t.color}38`}}
                      onClick={()=>awardAndNext(t.code,q.points)}>
                      {highlight&&<span style={{position:'absolute',top:-8,right:-8,background:'#32D74B',color:'#07071C',borderRadius:50,width:20,height:20,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.65rem',fontWeight:900}}>✓</span>}
                      +{q.points} → {t.name}
                      {sel&&<div style={{fontSize:'.72rem',opacity:.7,marginTop:3}}>picked: {sel}</div>}
                      {!sel&&ans&&<div style={{fontSize:'.72rem',opacity:.7,marginTop:3}}>said: {ans.answer}</div>}
                    </button>
                  );
                })}
              </div>
              <button className="btn btn-ghost" style={{width:'100%',marginTop:10}} onClick={()=>awardAndNext(null,0)}>No Points — Next Question →</button>
            </div>
          </div>)}
        </div>
      </div></div>
    );
  }

  // BONUS
  if(screen==='bonus'){
    const br=g?.bonusRound;
    return(
      <div className="app center">
        <div style={{marginBottom:14}}>
          <span className="tag" style={{background:'rgba(255,159,10,.18)',color:'#FF9F0A',border:'1px solid rgba(255,159,10,.35)',fontSize:'.85rem',padding:'6px 16px'}}>BONUS ROUND!</span>
        </div>
        <div className="bonus-wrap">
          <span className="bonus-emoji">{br?.emoji||'🎯'}</span>
          <h2 className="bonus-title">{br?.title}</h2>
          <p className="bonus-desc">{br?.description}</p>
          <span className="label" style={{marginBottom:10,display:'block',textAlign:'left'}}>Award 25 bonus points to:</span>
          <div className="award-grid">
            {teamsArr.map(t=>(
              <button key={t.code} className="award-btn" style={{background:`${t.color}14`,color:t.color,borderColor:`${t.color}38`}}
                onClick={()=>awardBonusAndNext(t.code)}>+25 → {t.name}</button>
            ))}
          </div>
          <button className="btn btn-ghost" style={{width:'100%',marginTop:12}} onClick={afterBonus}>Skip Bonus →</button>
        </div>
      </div>
    );
  }

  // RESULTS
  if(screen==='results'){
    const medals=['🥇','🥈','🥉','4️⃣'];
    return(
      <div className="app"><div style={{maxWidth:480,margin:'0 auto',paddingTop:20,textAlign:'center'}}>
        <div style={{fontSize:'3rem',marginBottom:8}}>🎉</div>
        <h1 className="game-title" style={{fontSize:'clamp(2.5rem,8vw,4rem)',marginBottom:4}}>Game Over!</h1>
        <p className="subtitle" style={{marginBottom:28}}>Final Leaderboard</p>
        {sortedTeams.map((t,i)=>(
          <div key={t.code} className="lb-row fade" style={{border:i===0?`2px solid ${t.color}`:'1px solid rgba(255,255,255,.07)',background:i===0?`${t.color}10`:'rgba(255,255,255,.03)'}}>
            <div className="lb-rank" style={{background:i===0?`${t.color}22`:'rgba(255,255,255,.07)',color:i===0?t.color:'rgba(255,255,255,.4)'}}>{i===0?'👑':medals[i]}</div>
            <div style={{flex:1,textAlign:'left'}}>
              <div style={{fontWeight:900}}>{t.name}</div>
              <div style={{fontSize:'.77rem',color:'rgba(255,255,255,.35)'}}>Leader: {t.leader}</div>
            </div>
            <div style={{fontFamily:"'Boogaloo',cursive",fontSize:'2rem',color:i===0?t.color:'rgba(255,255,255,.6)'}}>{t.score||0}</div>
          </div>
        ))}
        <div className="row" style={{justifyContent:'center',marginTop:28,flexWrap:'wrap',gap:12}}>
          <button className="btn btn-yellow" onClick={exitGame}>New Game</button>
        </div>
      </div></div>
    );
  }
  return null;
}

// PLAYER APP
function PlayerApp({onExit}){
  const [screen,setScreen]=useState('join');
  const [roomCode,setRoomCode]=useState('');
  const [teamCode,setTeamCode]=useState('');
  const [playerName,setPlayerName]=useState('');
  const [playerId,setPlayerId]=useState('');
  const [gameState,setGameState]=useState(null);
  const [myTeamCode,setMyTeamCode]=useState('');
  const [error,setError]=useState('');
  const [loading,setLoading]=useState(false);
  const [submitted,setSubmitted]=useState(false);
  const [mySelection,setMySelection]=useState(null);
  const [ansText,setAnsText]=useState('');
  const listenerRef=useRef(null);

  useEffect(()=>{return()=>{if(listenerRef.current)listenerRef.current.off();};},[]);

  const joinRoom=async()=>{
    setError('');setLoading(true);
    const code=roomCode.trim().toUpperCase();
    try{
      const snap=await db.ref(`games/${code}`).once('value');
      if(!snap.exists()){setError('Room not found. Check your code and try again.');setLoading(false);return;}
      const g=snap.val();
      if(g.status==='results'||g.status==='ended'){setError('This game has already ended.');setLoading(false);return;}
      setRoomCode(code);setScreen('teamcode');
    }catch(e){setError('Connection error. Please try again.');}
    setLoading(false);
  };

  const joinTeam=async()=>{
    setError('');setLoading(true);
    const tc=teamCode.trim().toUpperCase();
    try{
      const snap=await db.ref(`games/${roomCode}/teams/${tc}`).once('value');
      if(!snap.exists()){setError('Invalid team code. Ask your team for the correct code.');setLoading(false);return;}
      setMyTeamCode(tc);setScreen('name');
    }catch(e){setError('Connection error. Please try again.');}
    setLoading(false);
  };

  const joinGame=async()=>{
    if(!playerName.trim())return;setLoading(true);
    try{
      const pid=genCode(8);
      const teamSnap=await db.ref(`games/${roomCode}/teams/${myTeamCode}`).once('value');
      const team=teamSnap.val();
      await db.ref(`games/${roomCode}/players/${pid}`).set({name:playerName.trim(),teamCode:myTeamCode,teamName:team?.name||myTeamCode});
      setPlayerId(pid);
      const ref=db.ref(`games/${roomCode}`);
      ref.on('value',snap=>{if(snap.exists())setGameState(snap.val());});
      listenerRef.current=ref;
      setScreen('lobby');
    }catch(e){setError('Could not join. Please try again.');}
    setLoading(false);
  };

  // Reset on new question
  useEffect(()=>{setSubmitted(false);setMySelection(null);setAnsText('');},[gameState?.currentQ?.index]);

  const selectOption=async(opt)=>{
    if(mySelection)return; // lock once selected
    setMySelection(opt);
    await db.ref(`games/${roomCode}/currentQ/teamSelections/${myTeamCode}`).set(opt);
  };

  const submitAnswer=async(ans)=>{
    const myTeamData=gameState?.teams?.[myTeamCode];
    await db.ref(`games/${roomCode}/currentQ/teamAnswers/${myTeamCode}`).set({
      answer:ans,teamName:myTeamData?.name||myTeamCode,color:myTeamData?.color||'#888',submittedAt:Date.now()
    });
    await db.ref(`games/${roomCode}/currentQ/submittedAnswer`).set(ans);
    setSubmitted(true);
  };

  const buzzIn=async()=>{
    const teamData=gameState?.teams?.[myTeamCode];
    await db.ref(`games/${roomCode}/currentQ/buzzedTeam`).transaction(current=>{
      if(current===null||current===undefined||current==='')return myTeamCode;
      return undefined;
    });
    await db.ref(`games/${roomCode}/currentQ/buzzedTeamName`).transaction(current=>{
      if(!current)return teamData?.name||myTeamCode;
      return undefined;
    });
  };

  const g=gameState;
  const status=g?.status;
  const myTeam=g?.teams?.[myTeamCode];
  const teamsArr=g?toTeamsArr(g.teams):[];
  const sortedTeams=[...teamsArr].sort((a,b)=>b.score-a.score);
  const qs=g?toArr(g.questions):[];
  const q=g&&qs.length>0?qs[g.currentQ?.index||0]:null;
  const currentQ=g?.currentQ||{};
  const isBuzzed=currentQ.buzzedTeam===myTeamCode;
  const someoneElseBuzzed=currentQ.buzzedTeam&&currentQ.buzzedTeam!==myTeamCode;

  if(screen==='lobby'&&(status==='playing'||status==='bonus'||status==='results')){
    if(status==='playing')setScreen('playing');
    else if(status==='bonus')setScreen('bonus');
    else if(status==='results')setScreen('results');
  }
  if(screen==='playing'&&status==='bonus')setScreen('bonus');
  if(screen==='bonus'&&status==='playing')setScreen('playing');
  if(screen==='playing'&&status==='results')setScreen('results');
  if(screen==='bonus'&&status==='results')setScreen('results');

  if(screen==='join')return(
    <div className="app center">
      <h1 className="game-title" style={{fontSize:'clamp(2.5rem,8vw,4rem)',marginBottom:4}}>TRIVIA NIGHT</h1>
      <p className="subtitle" style={{marginBottom:32}}>Enter your room code to join</p>
      <div className="player-card">
        <span className="label" style={{textAlign:'center',display:'block',marginBottom:12}}>Room Code</span>
        <input className="inp inp-big" placeholder="e.g. ABC123" value={roomCode} maxLength={6}
          onChange={e=>setRoomCode(e.target.value.toUpperCase())} onKeyDown={e=>e.key==='Enter'&&joinRoom()}/>
        {error&&<p style={{color:'#FF3B6B',fontSize:'.83rem',marginTop:10,textAlign:'center',fontWeight:700}}>{error}</p>}
        <button className="btn btn-yellow btn-full" style={{marginTop:16}} onClick={joinRoom} disabled={roomCode.length<4||loading}>{loading?'Checking…':'Join Game →'}</button>
        <button className="btn btn-ghost btn-full" style={{marginTop:10}} onClick={onExit}>← Back</button>
      </div>
    </div>
  );

  if(screen==='teamcode')return(
    <div className="app center">
      <h2 style={{fontFamily:"'Boogaloo',cursive",fontSize:'2rem',color:'#FFE600',marginBottom:4}}>Enter Team Code</h2>
      <p style={{color:'rgba(255,255,255,.4)',marginBottom:28,fontSize:'.9rem'}}>Get this code from your team</p>
      <div className="player-card">
        <span className="label" style={{textAlign:'center',display:'block',marginBottom:12}}>Team Code</span>
        <input className="inp inp-big" placeholder="e.g. RED7" value={teamCode} maxLength={4}
          onChange={e=>setTeamCode(e.target.value.toUpperCase())} onKeyDown={e=>e.key==='Enter'&&joinTeam()}/>
        {error&&<p style={{color:'#FF3B6B',fontSize:'.83rem',marginTop:10,textAlign:'center',fontWeight:700}}>{error}</p>}
        <button className="btn btn-yellow btn-full" style={{marginTop:16}} onClick={joinTeam} disabled={teamCode.length<3||loading}>{loading?'Checking…':'Confirm Team →'}</button>
        <button className="btn btn-ghost btn-full" style={{marginTop:10}} onClick={()=>{setScreen('join');setError('');}}>← Back</button>
      </div>
    </div>
  );

  if(screen==='name')return(
    <div className="app center">
      <h2 style={{fontFamily:"'Boogaloo',cursive",fontSize:'2rem',color:'#FFE600',marginBottom:4}}>What's your name?</h2>
      <p style={{color:'rgba(255,255,255,.4)',marginBottom:28,fontSize:'.9rem'}}>This is how you'll appear in the game</p>
      <div className="player-card">
        <input className="inp" style={{fontSize:'1.1rem',padding:'14px 16px',marginBottom:14,textAlign:'center'}}
          placeholder="Your name…" value={playerName} onChange={e=>setPlayerName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&joinGame()}/>
        {error&&<p style={{color:'#FF3B6B',fontSize:'.83rem',marginTop:10,textAlign:'center',fontWeight:700}}>{error}</p>}
        <button className="btn btn-yellow btn-full" onClick={joinGame} disabled={!playerName.trim()||loading}>{loading?'Joining…':'Join Game!'}</button>
      </div>
    </div>
  );

  if(screen==='lobby')return(
    <div className="app center">
      <div style={{fontSize:'3rem',marginBottom:16}}>🎮</div>
      <h2 style={{fontFamily:"'Boogaloo',cursive",fontSize:'2rem',color:'#FFE600',marginBottom:6}}>You're in!</h2>
      <p style={{color:'rgba(255,255,255,.45)',marginBottom:6}}>Hi <strong style={{color:'#fff'}}>{playerName}</strong>!</p>
      {myTeam&&<div style={{display:'inline-flex',alignItems:'center',gap:8,padding:'8px 18px',borderRadius:50,background:`${myTeam.color}18`,border:`1.5px solid ${myTeam.color}35`,color:myTeam.color,fontWeight:800,marginBottom:28}}>{myTeam.name}</div>}
      <div style={{display:'flex',alignItems:'center',gap:8,color:'rgba(255,255,255,.4)',fontSize:'.92rem'}}>
        <span>Waiting for the host to start</span>
        <span className="waiting-dot"/><span className="waiting-dot"/><span className="waiting-dot"/>
      </div>
    </div>
  );

  if(screen==='playing'){
    if(!q)return<div className="app center"><p style={{color:'rgba(255,255,255,.4)'}}>Loading question…</p></div>;
    return(
      <div className="app"><div className="pwrap">
        <div style={{display:'flex',gap:7,flexWrap:'wrap',marginBottom:10}}>
          {teamsArr.map(t=>(
            <div key={t.code} className="score-badge" style={{background:`${t.color}14`,color:t.color,borderColor:t.code===myTeamCode?t.color:`${t.color}38`,borderWidth:t.code===myTeamCode?2:1.5}}>
              <span style={{fontSize:'.7rem',opacity:.75}}>{t.name}</span><strong>{t.score||0}</strong>
              {t.code===myTeamCode&&<span style={{fontSize:'.6rem',opacity:.6}}>YOU</span>}
            </div>
          ))}
          <span style={{marginLeft:'auto',fontSize:'.78rem',color:'rgba(255,255,255,.3)',flexShrink:0,alignSelf:'center'}}>Q {(currentQ.index||0)+1}/{qs.length}</span>
        </div>
        <div className="prog-bar"><div className="prog-fill" style={{width:`${((currentQ.index||0)/Math.max(qs.length,1))*100}%`}}/></div>

        <div className="card">
          <div className="row" style={{justifyContent:'space-between',marginBottom:14}}>
            <span className="qtype-badge" style={{background:`${TC[q.type]}15`,color:TC[q.type],borderColor:`${TC[q.type]}35`}}>{TL[q.type]}</span>
            <span className="tag" style={{background:'rgba(255,230,0,.1)',color:'#FFE600',border:'1px solid rgba(255,230,0,.2)'}}>{q.points} pts</span>
          </div>
          <div style={{fontSize:'clamp(.95rem,3vw,1.15rem)',fontWeight:900,lineHeight:1.5,marginBottom:22}}>{q.question}</div>

          {currentQ.phase==='question'&&(<>
            {/* MULTIPLE CHOICE — anyone can tap to select for their team */}
            {q.type==='multiple'&&q.options&&(<>
              {q.options.map((opt,i)=>(
                <button key={i} className={`opt ${mySelection===opt?'picked':''}`}
                  style={{cursor:mySelection?'default':'pointer'}}
                  onClick={()=>selectOption(opt)}>
                  <span className="letter">{LETTERS[i]}</span>{opt}
                  {mySelection===opt&&<span style={{marginLeft:'auto',fontSize:'.75rem',color:'#FFE600',fontWeight:800}}>YOUR PICK</span>}
                </button>
              ))}
              {mySelection&&<p style={{fontSize:'.82rem',color:'rgba(255,255,255,.4)',textAlign:'center',marginTop:6}}>Locked in — waiting for host to reveal…</p>}
            </>)}

            {/* TEXT — anyone can type and submit */}
            {q.type==='text'&&(<>
              {!submitted?(<>
                <input className="inp" style={{fontSize:'1rem',padding:'13px 16px',marginBottom:10}}
                  placeholder="Type your team's answer…" value={ansText} onChange={e=>setAnsText(e.target.value)}/>
                <button className="btn btn-yellow btn-full" onClick={()=>submitAnswer(ansText)} disabled={!ansText.trim()}>Submit Answer</button>
              </>):(
                <div style={{padding:14,borderRadius:12,background:'rgba(50,215,75,.1)',border:'1.5px solid rgba(50,215,75,.25)',color:'#32D74B',fontWeight:800,textAlign:'center'}}>
                  ✓ Answer submitted! Waiting for host…
                </div>
              )}
            </>)}

            {/* BUZZER — anyone can buzz in for their team */}
            {q.type==='buzzer'&&(<>
              {!currentQ.buzzedTeam&&(
                <button className="buzz-btn"
                  style={{borderColor:myTeam?.color||'#FFE600',background:`${myTeam?.color||'#FFE600'}18`,color:myTeam?.color||'#FFE600'}}
                  onClick={buzzIn}>
                  🔔 BUZZ IN!
                </button>
              )}
              {isBuzzed&&(<>
                <div style={{padding:14,borderRadius:12,background:`${myTeam?.color||'#FFE600'}18`,border:`2px solid ${myTeam?.color||'#FFE600'}`,color:myTeam?.color||'#FFE600',fontWeight:900,fontSize:'1.1rem',textAlign:'center',marginBottom:12}}>
                  🔔 YOUR TEAM BUZZED IN!
                </div>
                {!submitted?(<>
                  <input className="inp" style={{fontSize:'1rem',padding:'13px 16px',marginBottom:10}}
                    placeholder="Type your answer…" value={ansText} onChange={e=>setAnsText(e.target.value)}/>
                  <button className="btn btn-yellow btn-full" onClick={()=>submitAnswer(ansText)} disabled={!ansText.trim()}>Submit Answer</button>
                </>):(
                  <div style={{padding:12,borderRadius:12,background:'rgba(50,215,75,.1)',border:'1.5px solid rgba(50,215,75,.25)',color:'#32D74B',fontWeight:800,textAlign:'center'}}>
                    ✓ Answer submitted!
                  </div>
                )}
              </>)}
              {someoneElseBuzzed&&(
                <div style={{padding:14,borderRadius:12,background:'rgba(255,59,107,.08)',border:'1.5px solid rgba(255,59,107,.2)',color:'rgba(255,255,255,.6)',fontWeight:700,textAlign:'center'}}>
                  {currentQ.buzzedTeamName||'Another team'} buzzed in first!
                </div>
              )}
            </>)}
          </>)}

          {currentQ.phase==='reveal'&&(<div className="fade">
            <div className="correct-box">
              <div style={{fontSize:'.7rem',fontWeight:800,textTransform:'uppercase',letterSpacing:'.1em',color:'rgba(50,215,75,.6)',marginBottom:5}}>Correct Answer</div>
              <div style={{fontSize:'1.15rem',fontWeight:900,color:'#32D74B'}}>{q.answer}</div>
            </div>
            {q.type==='multiple'&&q.options&&q.options.map((opt,i)=>(
              <div key={i} className={`opt ${opt===q.answer?'right':opt===mySelection&&opt!==q.answer?'wrong':''}`} style={{cursor:'default'}}>
                <span className="letter">{LETTERS[i]}</span>{opt}
                {opt===q.answer&&<span style={{marginLeft:'auto',color:'#32D74B',fontWeight:900}}>✓</span>}
                {opt===mySelection&&opt!==q.answer&&<span style={{marginLeft:'auto',fontSize:'.75rem',color:'#FF3B6B',fontWeight:800}}>your pick</span>}
              </div>
            ))}
            <div style={{padding:12,borderRadius:12,background:'rgba(255,255,255,.05)',marginTop:12,textAlign:'center',fontSize:'.85rem',color:'rgba(255,255,255,.45)'}}>
              Waiting for host to award points…
            </div>
          </div>)}
        </div>
      </div></div>
    );
  }

  if(screen==='bonus'){
    const br=g?.bonusRound;
    return(
      <div className="app center">
        <div style={{marginBottom:14}}>
          <span className="tag" style={{background:'rgba(255,159,10,.18)',color:'#FF9F0A',border:'1px solid rgba(255,159,10,.35)',fontSize:'.85rem',padding:'6px 16px'}}>BONUS ROUND!</span>
        </div>
        <div className="bonus-wrap">
          <span className="bonus-emoji">{br?.emoji||'🎯'}</span>
          <h2 className="bonus-title">{br?.title}</h2>
          <p className="bonus-desc">{br?.description}</p>
          <div style={{padding:12,borderRadius:12,background:'rgba(255,255,255,.07)',fontSize:'.85rem',color:'rgba(255,255,255,.5)'}}>
            Waiting for host to award points<span className="waiting-dot"/><span className="waiting-dot"/><span className="waiting-dot"/>
          </div>
        </div>
      </div>
    );
  }

  if(screen==='results'){
    const medals=['🥇','🥈','🥉','4️⃣'];
    return(
      <div className="app"><div style={{maxWidth:480,margin:'0 auto',paddingTop:20,textAlign:'center'}}>
        <div style={{fontSize:'3rem',marginBottom:8}}>🎉</div>
        <h1 className="game-title" style={{fontSize:'clamp(2.5rem,8vw,4rem)',marginBottom:4}}>Game Over!</h1>
        <p className="subtitle" style={{marginBottom:28}}>Final Leaderboard</p>
        {sortedTeams.map((t,i)=>(
          <div key={t.code} className="lb-row fade" style={{border:t.code===myTeamCode?`2px solid ${t.color}`:i===0?`2px solid ${t.color}`:'1px solid rgba(255,255,255,.07)',background:i===0?`${t.color}10`:'rgba(255,255,255,.03)'}}>
            <div className="lb-rank" style={{background:i===0?`${t.color}22`:'rgba(255,255,255,.07)',color:i===0?t.color:'rgba(255,255,255,.4)'}}>{i===0?'👑':medals[i]}</div>
            <div style={{flex:1,textAlign:'left'}}>
              <div style={{fontWeight:900}}>{t.name}{t.code===myTeamCode&&<span style={{marginLeft:8,fontSize:'.72rem',color:'rgba(255,255,255,.38)',fontWeight:700}}>YOUR TEAM</span>}</div>
            </div>
            <div style={{fontFamily:"'Boogaloo',cursive",fontSize:'2rem',color:i===0?t.color:'rgba(255,255,255,.6)'}}>{t.score||0}</div>
          </div>
        ))}
        <button className="btn btn-yellow" style={{marginTop:28}} onClick={onExit}>Play Again</button>
      </div></div>
    );
  }
  return null;
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
